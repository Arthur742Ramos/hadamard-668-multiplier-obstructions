name: verify-light

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python3 lp333/id12_phase2/code/standalone_verifier.py
      - run: python3 lp333/id12_phase2/code/general_verifier.py
      - run: bash compression_theorem/scripts/run_all.sh
